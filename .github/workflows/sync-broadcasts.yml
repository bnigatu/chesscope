name: Sync Lichess broadcasts

on:
  schedule:
    # Mondays 06:00 UTC. Lichess publishes the broadcast dump roughly weekly;
    # picking Monday morning gives the freshest weekend-tournament data.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit to N games (smoke test). Leave empty for full run."
        required: false
        type: string
      store_pgn:
        description: "Persist full PGN bodies (larger DB)"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    name: Ingest broadcast PGN dump
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.limit }}")
          fi
          if [ "${{ github.event.inputs.store_pgn }}" = "true" ]; then
            ARGS+=(--store-pgn)
          fi
          python scripts/ingest_broadcasts.py "${ARGS[@]}"

      - name: Trigger Cloudflare deploy
        # Re-deploy so generateStaticParams picks up new top players.
        # Optional: skip if you'd rather rely on ISR alone.
        if: env.CLOUDFLARE_DEPLOY_HOOK != ''
        env:
          CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK" \
            && echo "[chesscope] deploy hook fired"
