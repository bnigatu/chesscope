name: Sync Lichess broadcasts

on:
  schedule:
    # Mondays 06:00 UTC. Lichess publishes the broadcast dump roughly weekly;
    # picking Monday morning gives the freshest weekend-tournament data.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit to N games (smoke test). Leave empty for full run."
        required: false
        type: string
      store_pgn:
        description: "Persist full PGN bodies (larger DB)"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    name: Ingest broadcast PGN dump
    runs-on: ubuntu-latest
    # Stays at 360 (the GitHub max) so the first few runs after
    # ingest_broadcasts.py started recording per-month SHA can chew
    # through the historical backlog. Each completed month is
    # persisted to sync_state and skipped on subsequent runs, so
    # weekly runs converge to ~5–10 min once backfill is done.
    # We can lower this to ~60 once `select count(*) from sync_state
    # where key like 'ingested_file:%'` matches the number of monthly
    # dumps Lichess publishes.
    timeout-minutes: 360
    # Hoisted to job level so the deploy steps below can gate
    # themselves on env.CLOUDFLARE_API_TOKEN != '' — when the secret
    # isn't configured, all the npm setup is skipped too, not just
    # the deploy itself.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.limit }}")
          fi
          if [ "${{ github.event.inputs.store_pgn }}" = "true" ]; then
            ARGS+=(--store-pgn)
          fi
          python scripts/ingest_broadcasts.py "${ARGS[@]}"

      # ── Auto-redeploy after successful ingest ─────────────────────────
      # Cloudflare Workers don't have native deploy hooks (Pages does);
      # the way to refresh the OpenNext R2 incremental cache from CI is
      # to actually re-run `wrangler deploy`, which is what `npm run
      # deploy` does locally. Without this, /player/[slug] pages cached
      # as 404 *before* refresh_players added the row stay 404 until
      # their 1h ISR window expires (and even then, OpenNext's SWR
      # rebuild was observed to not flip stale 404s reliably).
      #
      # All three deploy steps are gated on CLOUDFLARE_API_TOKEN being
      # set so the workflow stays a no-op until you've added the secret
      # — first-run-after-merge doesn't fail.
      - name: Set up Node for deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies for deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci

      - name: Deploy to Cloudflare (busts ISR cache)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: |
          node node_modules/@opennextjs/cloudflare/dist/cli/index.js build
          node node_modules/@opennextjs/cloudflare/dist/cli/index.js deploy
